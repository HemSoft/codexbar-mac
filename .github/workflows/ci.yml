name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Select Xcode 26.6
        run: |
          for candidate in \
            /Applications/Xcode_26.6.app/Contents/Developer \
            /Applications/Xcode_26.6.0.app/Contents/Developer \
            /Applications/Xcode.app/Contents/Developer
          do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "$candidate"
              break
            fi
          done
          xcode-select -p
          xcodebuild -version

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild \
            -project CodexBarMac.xcodeproj \
            -scheme CodexBarMac \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            test
